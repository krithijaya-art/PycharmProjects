name: HR AI Project CI

on:
  push:
    branches:
      - Main
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd Hr-AI-Testing-Project
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd Hr-AI-Testing-Project
          pytest tests -v

      - name: Install dependencies
        run: pip install -r Hr-AI-Testing-Project/requirements.txt

      - name: Run tests
        run: pytest Hr-AI-Testing-Project/tests -v
