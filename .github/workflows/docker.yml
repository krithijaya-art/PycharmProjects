name: Build Equipment Project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t equipment-image ./EquipmentStatusTrackerProject

      - name: Run Container
        run: docker run equipment-image > output.txt

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: equipment-output
          path: output.txt
